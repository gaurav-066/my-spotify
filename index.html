<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover"/>
<title>Raaga — Music Player</title>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0a0a0a;--surface:#111;--card:#1a1a1a;--card-h:#252525;
  --border:rgba(255,255,255,0.07);--green:#1ed760;
  --text:#fff;--text-dim:#b3b3b3;--text-muted:#535353;
  --player-h:88px;--nav-w:236px;--radius:10px;
}
html,body{height:100%}
body{background:var(--bg);color:var(--text);font-family:'Plus Jakarta Sans',sans-serif;overflow:hidden;user-select:none;-webkit-tap-highlight-color:transparent}
.app{display:grid;grid-template-columns:var(--nav-w) 1fr;grid-template-rows:1fr var(--player-h);height:100vh;height:100dvh;gap:8px;padding:8px 8px 0;background:#000}

/* SIDEBAR */
.sidebar{grid-row:1;grid-column:1;display:flex;flex-direction:column;gap:8px;overflow:hidden}
.sidebar-top{background:var(--surface);border-radius:12px;padding:1.4rem 1.1rem 1.1rem;flex-shrink:0}
.logo{display:flex;align-items:center;gap:10px;margin-bottom:1.6rem;text-decoration:none}
.logo-icon{width:36px;height:36px;background:var(--green);border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0;box-shadow:0 0 16px rgba(30,215,96,0.35)}
.logo-text{font-size:1.3rem;font-weight:800;letter-spacing:-0.04em;color:var(--text)}
nav{display:flex;flex-direction:column;gap:2px}
.nav-btn{display:flex;align-items:center;gap:14px;padding:9px 10px;border-radius:8px;cursor:pointer;color:var(--text-muted);font-size:.875rem;font-weight:700;transition:color .15s;background:none;border:none;width:100%;text-align:left;font-family:inherit}
.nav-btn:hover{color:var(--text-dim)}.nav-btn.active{color:var(--text)}
.nav-btn svg{width:22px;height:22px;fill:currentColor;flex-shrink:0}
.sidebar-lib{background:var(--surface);border-radius:12px;padding:1.1rem;flex:1;overflow:hidden;display:flex;flex-direction:column}
.lib-top{display:flex;align-items:center;gap:8px;margin-bottom:1rem;color:var(--text-muted);font-size:.78rem;font-weight:700;letter-spacing:.06em;text-transform:uppercase}
.lib-top svg{width:18px;height:18px;fill:currentColor}
.lib-hint{font-size:.8rem;color:var(--text-muted);line-height:1.65}

/* MAIN */
.main{grid-row:1;grid-column:2;background:var(--surface);border-radius:12px;overflow-y:auto;overflow-x:hidden;scrollbar-width:thin;scrollbar-color:rgba(255,255,255,0.12) transparent;position:relative}
.main::-webkit-scrollbar{width:5px}.main::-webkit-scrollbar-thumb{background:rgba(255,255,255,0.12);border-radius:3px}

/* HOME */
#view-home{animation:fadeIn .3s ease}
.home-hero{padding:2rem 1.75rem 1.25rem;background:linear-gradient(180deg,rgba(30,215,96,0.2) 0%,transparent 100%)}
.home-greeting{font-size:1.85rem;font-weight:800;letter-spacing:-0.035em;line-height:1.15;margin-bottom:6px}
.home-sub{font-size:.875rem;color:var(--text-dim);font-weight:500}
.home-body{padding:.75rem 1.75rem 2.5rem}
.sec-block{margin-bottom:2.25rem}
.sec-head{display:flex;align-items:baseline;justify-content:space-between;margin-bottom:1rem}
.sec-title{font-size:1.2rem;font-weight:700;letter-spacing:-0.025em}
.see-all{font-size:.72rem;font-weight:700;color:var(--text-muted);letter-spacing:.08em;text-transform:uppercase;cursor:pointer;background:none;border:none;font-family:inherit;transition:color .15s;padding:0}
.see-all:hover{color:var(--text)}
.sec-scroll{display:flex;gap:14px;overflow-x:auto;padding-bottom:4px;scrollbar-width:none;-webkit-overflow-scrolling:touch}
.sec-scroll::-webkit-scrollbar{display:none}

/* MUSIC CARD */
.mcard{flex-shrink:0;width:156px;cursor:pointer}
.mcard-art{position:relative;width:156px;height:156px;border-radius:var(--radius);overflow:hidden;background:var(--card);margin-bottom:10px;box-shadow:0 6px 20px rgba(0,0,0,.5);transition:box-shadow .25s}
.mcard:hover .mcard-art{box-shadow:0 10px 28px rgba(0,0,0,.65)}
.mcard-img{width:100%;height:100%;object-fit:cover;display:block;transition:transform .35s ease}
.mcard:hover .mcard-img{transform:scale(1.06)}
.mcard-overlay{position:absolute;bottom:8px;right:8px;width:42px;height:42px;background:var(--green);border-radius:50%;display:flex;align-items:center;justify-content:center;opacity:0;transform:translateY(10px);transition:opacity .2s,transform .2s;box-shadow:0 4px 14px rgba(0,0,0,.5)}
.mcard:hover .mcard-overlay,.mcard.playing .mcard-overlay{opacity:1;transform:translateY(0)}
.mcard-overlay svg{fill:#000;width:18px;height:18px}
.mcard-title{font-size:.84rem;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;color:var(--text);line-height:1.3}
.mcard.playing .mcard-title{color:var(--green)}
.mcard-artist{font-size:.74rem;color:var(--text-dim);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-top:3px}

/* SHIMMER */
.shimmer-art{background:linear-gradient(90deg,var(--card) 25%,var(--card-h) 50%,var(--card) 75%);background-size:200% 100%;animation:shimmer 1.6s infinite}
.shimmer-line{height:11px;border-radius:5px;margin-bottom:8px;background:linear-gradient(90deg,var(--card) 25%,var(--card-h) 50%,var(--card) 75%);background-size:200% 100%;animation:shimmer 1.6s infinite}
.shimmer-line.w80{width:80%}.shimmer-line.w55{width:55%;height:9px}
@keyframes shimmer{from{background-position:200% 0}to{background-position:-200% 0}}

/* SEARCH */
#view-search{animation:fadeIn .25s ease}
.search-wrap{padding:1.5rem 1.75rem 2rem}
.search-box{position:relative;max-width:420px;margin-bottom:1.75rem}
.search-box input{width:100%;background:var(--card-h);border:none;border-radius:500px;padding:13px 18px 13px 50px;color:var(--text);font-family:'Plus Jakarta Sans',sans-serif;font-size:.875rem;font-weight:500;outline:none;transition:background .2s,box-shadow .2s}
.search-box input:focus{background:#2e2e2e;box-shadow:0 0 0 2px rgba(30,215,96,.4)}
.search-box input::placeholder{color:var(--text-muted)}
.s-icon{position:absolute;left:17px;top:50%;transform:translateY(-50%);color:var(--text-dim);pointer-events:none;width:18px;height:18px}
.r-header{font-size:1.3rem;font-weight:700;letter-spacing:-0.025em;margin-bottom:1rem}
#status{color:var(--text-dim);font-size:.875rem;padding:3.5rem 0;text-align:center;display:flex;flex-direction:column;align-items:center;gap:12px}
.status-icon{font-size:2.5rem;opacity:.25}
.results-list{display:flex;flex-direction:column}

/* TRACK ROWS */
.trow{display:grid;grid-template-columns:34px 50px 1fr auto;align-items:center;gap:13px;padding:7px 10px;border-radius:6px;cursor:pointer;transition:background .13s;animation:fadeUp .22s ease both}
.trow:hover{background:rgba(255,255,255,.06)}.trow.playing{background:rgba(30,215,96,.09)}
.tnum{text-align:right;font-size:.82rem;color:var(--text-muted);font-variant-numeric:tabular-nums;position:relative}
.tnum .n{transition:opacity .13s}.tnum .pb{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;opacity:0;transition:opacity .13s;font-size:13px}
.trow:hover .tnum .n{opacity:0}.trow:hover .tnum .pb{opacity:1}
.trow.playing .tnum .n{opacity:0}.trow.playing .tnum .pb{opacity:1;color:var(--green)}
.tthumb{width:50px;height:50px;border-radius:5px;object-fit:cover;background:var(--card);display:block}
.tinfo{min-width:0}
.ttitle{font-size:.875rem;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;transition:color .13s}
.trow.playing .ttitle{color:var(--green)}
.tartist{font-size:.76rem;color:var(--text-dim);margin-top:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.eq{display:none;align-items:flex-end;gap:2px;height:16px}
.trow.playing .eq{display:flex}
.eqb{width:3px;background:var(--green);border-radius:1px;animation:eqb .7s ease-in-out infinite alternate}
.eqb:nth-child(1){height:35%;animation-delay:0s}.eqb:nth-child(2){height:100%;animation-delay:.12s}.eqb:nth-child(3){height:55%;animation-delay:.25s}
@keyframes eqb{from{transform:scaleY(.2)}to{transform:scaleY(1)}}

/* BOTTOM PLAYER */
.player{grid-row:2;grid-column:1/-1;background:#191919;border-top:1px solid var(--border);display:flex;align-items:center;padding:0 1.5rem;gap:1rem;height:var(--player-h);z-index:10;cursor:pointer}
.p-left{display:flex;align-items:center;gap:13px;width:270px;flex-shrink:0}
#p-thumb{width:56px;height:56px;border-radius:6px;object-fit:cover;background:var(--card);flex-shrink:0;display:block}
.p-meta{min-width:0}
#p-title{font-size:.86rem;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-bottom:3px}
#p-artist{font-size:.74rem;color:var(--text-dim);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.p-center{flex:1;display:flex;flex-direction:column;align-items:center;gap:7px}
.p-ctrls{display:flex;align-items:center;gap:18px}
.cbtn{background:none;border:none;color:var(--text-muted);cursor:pointer;display:flex;align-items:center;justify-content:center;transition:color .15s,transform .1s;padding:4px;border-radius:50%}
.cbtn:hover{color:var(--text);transform:scale(1.1)}.cbtn svg{width:16px;height:16px;fill:currentColor}
.cbtn.pp{width:34px;height:34px;background:var(--text);border-radius:50%;color:#000}
.cbtn.pp:hover{background:#e0e0e0;transform:scale(1.06)}.cbtn.pp svg{width:17px;height:17px;fill:#000}
.prog-wrap{display:flex;align-items:center;gap:9px;width:100%;max-width:540px}
.tlabel{font-size:.68rem;color:var(--text-muted);font-variant-numeric:tabular-nums;flex-shrink:0;width:32px}
.tlabel.r{text-align:right}
.prog-bar{flex:1;height:4px;background:rgba(255,255,255,.14);border-radius:2px;cursor:pointer;transition:height .12s;position:relative}
.prog-bar:hover{height:6px}
.prog-fill{height:100%;background:var(--text-dim);border-radius:2px;width:0%;transition:background .15s;pointer-events:none}
.prog-bar:hover .prog-fill{background:var(--green)}
.prog-fill::after{content:'';position:absolute;right:-5px;top:50%;transform:translateY(-50%) scale(0);width:11px;height:11px;background:var(--text);border-radius:50%;transition:transform .13s}
.prog-bar:hover .prog-fill::after{transform:translateY(-50%) scale(1)}
.p-right{width:270px;flex-shrink:0;display:flex;align-items:center;justify-content:flex-end;gap:10px}
.vol-wrap{display:flex;align-items:center;gap:7px}
.vol-bar{width:88px;height:4px;background:rgba(255,255,255,.14);border-radius:2px;cursor:pointer;transition:height .12s}
.vol-bar:hover{height:6px}
.vol-fill{height:100%;background:var(--text-dim);border-radius:2px;width:70%;transition:background .15s}
.vol-bar:hover .vol-fill{background:var(--green)}
.mob-nav{display:none}

/* ── NOW PLAYING OVERLAY ── */
.np-overlay{position:fixed;inset:0;z-index:2000;display:flex;align-items:center;justify-content:center;padding:20px;opacity:0;visibility:hidden;pointer-events:none;transition:opacity .24s ease,visibility .24s ease}
.np-overlay.open{opacity:1;visibility:visible;pointer-events:all}
.np-backdrop{position:absolute;inset:0;background:rgba(0,0,0,.78);backdrop-filter:blur(22px);-webkit-backdrop-filter:blur(22px)}

/* ── PANEL ── */
.np-panel{
  position:relative;width:min(94vw,640px);background:#161616;
  border:1px solid rgba(255,255,255,.1);border-radius:24px;
  box-shadow:0 24px 80px rgba(0,0,0,.7);overflow:hidden;
  display:flex;flex-direction:column;
  transform:translateY(18px) scale(.98);
  transition:transform .3s cubic-bezier(.32,.72,0,1),width .35s ease,height .35s ease,
             border-radius .35s ease,top .35s ease,left .35s ease;
  max-height:92vh;
}
.np-overlay.open .np-panel{transform:translateY(0) scale(1)}

/* ── FULLSCREEN ── */
.np-overlay.fullscreen{padding:0;align-items:stretch;justify-content:stretch}
.np-overlay.fullscreen .np-backdrop{display:none}
.np-overlay.fullscreen .np-panel{width:100%;max-height:100%;height:100%;border-radius:0;border:none;background:#0a0a0a;display:grid;grid-template-rows:1fr auto}
.np-overlay.fullscreen .np-art-wrap{margin:0;border-radius:0;aspect-ratio:unset;flex:1;height:100%}
.np-overlay.fullscreen .np-head{display:none}
.np-overlay.fullscreen .np-bottom{background:linear-gradient(to top,rgba(0,0,0,.95) 0%,rgba(0,0,0,.7) 100%);padding:20px 32px 28px}
.np-overlay.fullscreen .np-info{padding:0 0 10px}
.np-overlay.fullscreen .np-song-title{font-size:1.5rem}
.np-overlay.fullscreen .np-prog-wrap{padding:0 0 4px}
.np-overlay.fullscreen .np-ctrls{padding:12px 0 0}

/* Header buttons */
.np-close{position:absolute;top:14px;right:56px;width:34px;height:34px;border:none;border-radius:50%;background:rgba(255,255,255,.1);color:var(--text);cursor:pointer;z-index:10;display:flex;align-items:center;justify-content:center;transition:background .15s}
.np-close:hover{background:rgba(255,255,255,.2)}.np-close svg{width:16px;height:16px;fill:currentColor}
.np-fs-btn{position:absolute;top:14px;right:14px;width:34px;height:34px;border:none;border-radius:50%;background:rgba(255,255,255,.1);color:var(--text);cursor:pointer;z-index:10;display:flex;align-items:center;justify-content:center;transition:background .15s}
.np-fs-btn:hover{background:rgba(255,255,255,.2)}.np-fs-btn svg{width:16px;height:16px;fill:currentColor}
.fs-expand{display:flex}.fs-compress{display:none}
.np-overlay.fullscreen .fs-expand{display:none}.np-overlay.fullscreen .fs-compress{display:flex}
.np-overlay.fullscreen .np-close{top:16px;right:62px;background:rgba(0,0,0,.5)}
.np-overlay.fullscreen .np-fs-btn{top:16px;right:16px;background:rgba(0,0,0,.5)}
.np-head{padding:18px 18px 0;display:flex;align-items:center;justify-content:space-between}
.np-head-label{font-size:.72rem;font-weight:700;letter-spacing:.11em;text-transform:uppercase;color:var(--text-dim)}

/* ── ART AREA ── */
.np-art-wrap{position:relative;margin:16px 18px 0;border-radius:16px;overflow:hidden;background:#000;box-shadow:0 18px 50px rgba(0,0,0,.6);aspect-ratio:16/9;transition:border-radius .35s ease,margin .35s ease}

/* THIS SHIELD BLOCKS YOUTUBE CLICKS BY DEFAULT */
#yt-player-frame{
  position:absolute; inset:0; width:100%; height:100%; border:none; 
  background:#000; display:block; z-index:1;
  pointer-events: none; 
}

#np-art-cover{position:absolute;inset:0;z-index:2;width:100%;height:100%;object-fit:cover;transition:opacity .35s ease;opacity:1;pointer-events:none}
.np-art-wrap.video-mode #np-art-cover{opacity:0}

/* Pill buttons on art */
.art-pill{
  position:absolute;bottom:10px;z-index:5;
  display:inline-flex;align-items:center;gap:6px;padding:7px 13px;
  border:1px solid rgba(255,255,255,.2);background:rgba(0,0,0,.72);color:#fff;
  border-radius:999px;font-size:.72rem;font-weight:700;cursor:pointer;font-family:inherit;
  transition:background .15s,border-color .15s;backdrop-filter:blur(6px);
}
.art-pill:hover{background:rgba(0,0,0,.92);border-color:rgba(255,255,255,.4)}
.art-pill svg{width:13px;height:13px;fill:currentColor;flex-shrink:0}
.art-pill.on{background:rgba(30,215,96,.18);border-color:rgba(30,215,96,.5);color:var(--green)}
#vid-toggle-btn{right:10px}

/* Bottom section */
.np-bottom{transition:background .35s ease,padding .35s ease}
.np-info{padding:18px 22px 4px}
.np-song-title{font-size:1.25rem;font-weight:800;letter-spacing:-0.03em;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;transition:font-size .2s}
.np-song-artist{margin-top:4px;font-size:.9rem;color:var(--text-dim);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.np-prog-wrap{padding:10px 22px 0;display:flex;align-items:center;gap:9px}
.np-prog-bar{flex:1;height:3px;background:rgba(255,255,255,.14);border-radius:2px;cursor:pointer;transition:height .12s}
.np-prog-bar:hover{height:5px}
.np-prog-fill{height:100%;background:var(--green);border-radius:2px;width:0%;pointer-events:none}
.np-tlabel{font-size:.67rem;color:var(--text-muted);font-variant-numeric:tabular-nums;flex-shrink:0;width:30px}
.np-tlabel.r{text-align:right}
.np-ctrls{display:flex;align-items:center;justify-content:center;gap:22px;padding:14px 22px 22px}
.np-cbtn{background:none;border:none;color:var(--text-muted);cursor:pointer;display:flex;align-items:center;justify-content:center;transition:color .15s,transform .1s;padding:4px;border-radius:50%}
.np-cbtn:hover{color:var(--text);transform:scale(1.12)}.np-cbtn svg{width:18px;height:18px;fill:currentColor}
.np-cbtn.pp{width:52px;height:52px;background:var(--text);border-radius:50%}
.np-cbtn.pp:hover{background:#e0e0e0;transform:scale(1.05)}.np-cbtn.pp svg{width:24px;height:24px;fill:#000}

/* ANIMATIONS */
@keyframes fadeUp{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}

/* TABLET */
@media(max-width:900px){
  :root{--nav-w:68px}
  .sidebar-top{padding:1.1rem .6rem}
  .logo-text,.lib-top span:not(svg),.lib-hint,.nav-btn span{display:none}
  .logo{justify-content:center;margin-bottom:1.1rem}
  .nav-btn{justify-content:center;padding:10px 8px}
  .sidebar-lib{padding:.6rem;align-items:center}.lib-top{justify-content:center}
  .p-left,.p-right{width:auto}.p-right .vol-wrap{display:none}
  #p-title,#p-artist{max-width:100px}.tlabel{display:none}
  .home-hero{padding:1.5rem 1.25rem 1rem}.home-body{padding:.5rem 1.25rem 2rem}
  .search-wrap{padding:1.25rem}
}

/* MOBILE */
@media(max-width:640px){
  :root{--player-h:66px}
  .app{grid-template-columns:1fr;grid-template-rows:1fr var(--player-h) 58px;padding:0;gap:0;background:var(--bg)}
  .sidebar{display:none}
  .main{grid-row:1;grid-column:1;border-radius:0}
  .player{grid-row:2;grid-column:1;border-radius:0;background:#1e1e1e;padding:0 1rem;height:var(--player-h)}
  .p-center{display:none}.p-left{flex:1;width:auto}.p-right{width:auto;gap:14px}.p-right .vol-wrap{display:none}
  .cbtn.shuffle,.cbtn.prev,.cbtn.next-btn,.cbtn.repeat{display:none}
  #p-thumb{width:46px;height:46px}
  .mob-nav{display:flex;grid-row:3;grid-column:1;background:#0e0e0e;border-top:1px solid var(--border);align-items:stretch}
  .mnbtn{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px;background:none;border:none;color:var(--text-muted);font-family:'Plus Jakarta Sans',sans-serif;font-size:.6rem;font-weight:700;letter-spacing:.04em;cursor:pointer;padding:6px 0;transition:color .15s}
  .mnbtn.active{color:var(--text)}.mnbtn svg{width:22px;height:22px;fill:currentColor;margin-bottom:1px}
  .home-hero{padding:1.25rem 1rem .75rem}.home-greeting{font-size:1.5rem}
  .home-body{padding:.5rem 1rem 1.5rem}.sec-title{font-size:1.05rem}
  .mcard{width:128px}.mcard-art{width:128px;height:128px}
  .np-overlay{align-items:flex-end;padding:8px}
  .np-panel{width:100%;border-radius:20px 20px 0 0}
  .np-overlay.fullscreen{padding:0;align-items:stretch}
  .np-overlay.fullscreen .np-panel{border-radius:0}
  .trow{grid-template-columns:0 46px 1fr auto;gap:10px;padding:7px 4px}.tnum{display:none}
  .tthumb{width:46px;height:46px}
}
</style>
</head>
<body>
<div class="app">

  <aside class="sidebar">
    <div class="sidebar-top">
      <div class="logo">
        <div class="logo-icon">♪</div>
        <span class="logo-text">Raaga</span>
      </div>
      <nav>
        <button class="nav-btn active" id="nav-home" onclick="showHome()">
          <svg viewBox="0 0 24 24"><path d="M12.72 2.28a1 1 0 0 0-1.44 0l-9 9a1 1 0 0 0 1.44 1.44L4 12.41V21a1 1 0 0 0 1 1h5v-6h4v6h5a1 1 0 0 0 1-1v-8.59l.28.27a1 1 0 0 0 1.44-1.44z"/></svg>
          <span>Home</span>
        </button>
        <button class="nav-btn" id="nav-search" onclick="showSearch()">
          <svg viewBox="0 0 24 24"><path d="M15.5 14h-.79l-.28-.27A6.47 6.47 0 0 0 16 9.5 6.5 6.5 0 1 0 9.5 16c1.61 0 3.09-.59 4.23-1.57l.27.28v.79l5 4.99L20.49 19zm-6 0C7.01 14 5 11.99 5 9.5S7.01 5 9.5 5 14 7.01 14 9.5 11.99 14 9.5 14z"/></svg>
          <span>Search</span>
        </button>
        <button class="nav-btn">

<script src="https://www.youtube.com/iframe_api"></script>
<script>
const API = 'https://new-youtube-o7cl.onrender.com';

const HOME_SECTIONS = [
  { id:'trending',  title:'🔥 Trending Right Now',  query:'bollywood trending hits 2024' },
  { id:'bollywood', title:'🎵 Bollywood Hits',       query:'bollywood superhit songs 2024' },
  { id:'arijit',   title:'🎤 Arijit Singh',          query:'arijit singh best songs' },
  { id:'romantic', title:'💕 Romantic Hits',          query:'hindi romantic songs 2024' },
  { id:'party',    title:'🎉 Party Bangers',          query:'bollywood dance party songs' },
  { id:'classics', title:'⭐ 90s Nostalgia',          query:'90s bollywood classic songs' },
];

/* ── DOM refs ── */
const resultsEl    = document.getElementById('results');
const statusEl     = document.getElementById('status');
const secHeader    = document.getElementById('section-header');
const secTitle     = document.getElementById('section-title');
const pThumb       = document.getElementById('p-thumb');
const pTitle       = document.getElementById('p-title');
const pArtist      = document.getElementById('p-artist');
const progFill     = document.getElementById('prog-fill');
const progBar      = document.getElementById('prog-bar');
const tCur         = document.getElementById('t-cur');
const tTot         = document.getElementById('t-tot');
const ppBtn        = document.getElementById('pp-btn');
const playIcon     = document.getElementById('play-icon');
const pauseIcon    = document.getElementById('pause-icon');
const nextBtn      = document.getElementById('next-btn');
const prevBtn      = document.getElementById('prev-btn');
const volBar       = document.getElementById('vol-bar');
const volFill      = document.getElementById('vol-fill');
const playerBar    = document.getElementById('player-bar');
const npOverlay    = document.getElementById('np-overlay');
const npBackdrop   = document.getElementById('np-backdrop');
const npCloseBtn   = document.getElementById('np-close-btn');
const npArtWrap    = document.getElementById('np-art-wrap');
const npArtCover   = document.getElementById('np-art-cover');
const npSongTitle  = document.getElementById('np-song-title');
const npSongArtist = document.getElementById('np-song-artist');
const npProgFill   = document.getElementById('np-prog-fill');
const npProgBar    = document.getElementById('np-prog-bar');
const npTCur       = document.getElementById('np-t-cur');
const npTTot       = document.getElementById('np-t-tot');
const npPpBtn      = document.getElementById('np-pp-btn');
const npPlayIcon   = document.getElementById('np-play-icon');
const npPauseIcon  = document.getElementById('np-pause-icon');
const npNextBtn    = document.getElementById('np-next-btn');
const npPrevBtn    = document.getElementById('np-prev-btn');
const vidToggleBtn = document.getElementById('vid-toggle-btn');
const vidLabel     = document.getElementById('vid-label');
const vidIconVideo = document.getElementById('vid-icon-video');
const vidIconAudio = document.getElementById('vid-icon-audio');

/* ── State ── */
let tracks = [], currentIdx = -1, isPlaying = false;
let progTimer = null, duration = 0;
let ytPlayer = null, ytReady = false;
let activeEl = null, queueEl = null;
let currentItem = null;
let videoMode = false, panelOpen = false;
let currentVolume = 70;

/* ── YT IFrame API ── */
window.onYouTubeIframeAPIReady = () => {
  ytReady = true;
  ytPlayer = new YT.Player('yt-player-frame', {
    width: '100%', height: '100%',
    // 👇 CONTROLS ENABLED HERE
    playerVars: { autoplay:0, playsinline:1, controls:1, rel:0, modestbranding:1 },
    events: {
      onReady(e){
        e.target.setVolume(currentVolume);
      },
      onStateChange(e){
        const S = YT.PlayerState;
        if(e.data === S.PLAYING){
          isPlaying = true; showPauseAll();
          try{ duration = ytPlayer.getDuration(); updateTotLabel(); }catch(_){}
          startLoop();
        }
        if(e.data === S.PAUSED) { isPlaying = false; showPlayAll(); stopLoop(); }
        if(e.data === S.ENDED)  { playNext(); }
      }
    }
  });
};

/* ── Greeting ── */
(()=>{
  const h = new Date().getHours();
  const el = document.getElementById('home-greeting');
  if(h>=5&&h<12) el.textContent='Good morning ☀️';
  else if(h>=12&&h<17) el.textContent='Good afternoon 🌤️';
  else if(h>=17&&h<21) el.textContent='Good evening 🌙';
  else el.textContent='Good night 🌙';
})();

/* ── Nav ── */
function setNav(v){
  ['home','search'].forEach(n=>{
    document.getElementById('nav-'+n).classList.toggle('active',v===n);
    document.getElementById('mob-'+n).classList.toggle('active',v===n);
  });
}
function showHome(){
  document.getElementById('view-home').style.display='';
  document.getElementById('view-search').style.display='none';
  setNav('home');
  document.getElementById('main').scrollTo({top:0,behavior:'smooth'});
}
function showSearch(){
  document.getElementById('view-home').style.display='none';
  document.getElementById('view-search').style.display='';
  setNav('search');
  setTimeout(()=>document.getElementById('search-input').focus(),80);
}

/* ── UI helpers ── */
function fmt(s){ s=Math.floor(s||0); return `${Math.floor(s/60)}:${String(s%60).padStart(2,'0')}`; }
function showPlayAll(){
  playIcon.style.display=''; pauseIcon.style.display='none';
  npPlayIcon.style.display=''; npPauseIcon.style.display='none';
}
function showPauseAll(){
  playIcon.style.display='none'; pauseIcon.style.display='';
  npPlayIcon.style.display='none'; npPauseIcon.style.display='';
}
function updateTotLabel(){
  const d = fmt(duration);
  tTot.textContent = d; npTTot.textContent = d;
}

/* ── Progress loop ── */
function startLoop(){
  stopLoop();
  progTimer = setInterval(()=>{
    if(!ytPlayer?.getCurrentTime) return;
    const t = ytPlayer.getCurrentTime();
    if(!duration) try{ duration=ytPlayer.getDuration(); updateTotLabel(); }catch(_){}
    const pct = duration > 0 ? (t/duration)*100 : 0;
    progFill.style.width = pct+'%'; npProgFill.style.width = pct+'%';
    const f = fmt(t);
    tCur.textContent = f; npTCur.textContent = f;
  }, 500);
}
function stopLoop(){ if(progTimer){ clearInterval(progTimer); progTimer=null; } }

/* ── Home sections ── */
function buildShimmerSection(sec){
  const body = document.getElementById('home-body');
  const block = document.createElement('div');
  block.className='sec-block'; block.id=`blk-${sec.id}`;
  block.innerHTML=`
    <div class="sec-head">
      <span class="sec-title">${sec.title}</span>
      <button class="see-all" onclick="jumpToSearch(${JSON.stringify(sec.query)})">See all</button>
    </div>
    <div class="sec-scroll" id="scr-${sec.id}">
      ${Array(7).fill(0).map(()=>`
        <div class="mcard">
          <div class="mcard-art shimmer-art"></div>
          <div class="shimmer-line w80"></div>
          <div class="shimmer-line w55"></div>
        </div>`).join('')}
    </div>`;
  body.appendChild(block);
}

function parseTitleArtist(raw){
  const p=raw.split(' - ');
  return p.length>1?{artist:p[0],title:p.slice(1).join(' - ')}:{artist:'',title:raw};
}

function populateSection(sec,items){
  const scrollEl=document.getElementById(`scr-${sec.id}`);
  if(!scrollEl) return;
  scrollEl.innerHTML='';
  items.forEach((item,i)=>{
    const {title,artist}=parseTitleArtist(item.title||'');
    const card=document.createElement('div');
    card.className='mcard';
    card.innerHTML=`
      <div class="mcard-art">
        <img class="mcard-img" src="${item.thumbnail||''}" onerror="this.style.opacity=0" alt=""/>
        <div class="mcard-overlay"><svg viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg></div>
      </div>
      <div class="mcard-title">${title}</div>
      <div class="mcard-artist">${artist}</div>`;
    card.addEventListener('click',()=>{ tracks=items; playFromSection(items,i,card,scrollEl); });
    scrollEl.appendChild(card);
  });
}

async function loadSection(sec,delay){
  await new Promise(r=>setTimeout(r,delay));
  try{
    const res=await fetch(`${API}/search?q=${encodeURIComponent(sec.query)}`);
    const data=await res.json();
    if(data?.length) populateSection(sec,data);
    else document.getElementById(`scr-${sec.id}`).innerHTML='<span style="color:var(--text-muted);font-size:.8rem;padding:.5rem 0;display:block">Nothing found</span>';
  }catch{
    document.getElementById(`scr-${sec.id}`).innerHTML='<span style="color:var(--text-muted);font-size:.8rem;padding:.5rem 0;display:block">Couldn\'t load</span>';
  }
}

function initHome(){
  document.getElementById('home-body').innerHTML='';
  HOME_SECTIONS.forEach((sec,i)=>{ buildShimmerSection(sec); loadSection(sec,i*250); });
}

function jumpToSearch(q){ showSearch(); document.getElementById('search-input').value=q; search(q); }

/* ── Playback ── */
function setActive(el){
  if(activeEl) activeEl.classList.remove('playing');
  activeEl=el; if(el) el.classList.add('playing');
}
function playFromSection(items,idx,cardEl,containerEl){
  setActive(cardEl); currentIdx=idx; queueEl=containerEl; playItem(items[idx]);
}
function playFromRow(item,rowEl,idx){
  setActive(rowEl); currentIdx=idx; queueEl=resultsEl; playItem(item);
}

function playItem(item){
  currentItem = item;
  const {title,artist} = parseTitleArtist(item.title||'');
  pThumb.src = item.thumbnail||'';
  pTitle.textContent = title||item.title;
  pArtist.textContent = artist;
  pTitle.style.color = '';
  npSongTitle.textContent = title||item.title;
  npSongArtist.textContent = artist;
  npArtCover.src = item.thumbnail||'';
  progFill.style.width='0%'; npProgFill.style.width='0%';
  tCur.textContent='0:00'; npTCur.textContent='0:00';
  tTot.textContent='0:00'; npTTot.textContent='0:00';
  duration = 0;

  if(ytPlayer && ytReady){
    ytPlayer.loadVideoById({ videoId: item.videoId });
  } else {
    const t = setInterval(()=>{
      if(ytReady && ytPlayer){
        clearInterval(t);
        ytPlayer.loadVideoById({ videoId: item.videoId });
      }
    }, 100);
  }
  openNowPlaying();
  showPauseAll();
}

function playNext(){
  if(currentIdx >= tracks.length-1) return;
  currentIdx++;
  const item = tracks[currentIdx];
  if(queueEl){ const el=queueEl.children[currentIdx]; setActive(el||null); if(el) el.scrollIntoView({behavior:'smooth',block:'nearest'}); }
  playItem(item);
}
function playPrev(){
  if(currentIdx <= 0) return;
  currentIdx--;
  const item = tracks[currentIdx];
  if(queueEl){ const el=queueEl.children[currentIdx]; setActive(el||null); if(el) el.scrollIntoView({behavior:'smooth',block:'nearest'}); }
  playItem(item);
}

/* ── Video / audio mode ── */
function setVideoMode(on){
  videoMode = on;
  const ytFrame = document.getElementById('yt-player-frame');
  const customControls = document.querySelector('.np-bottom');
  const customFsBtn = document.getElementById('np-fs-btn');

  if(on){
    // 📺 VIDEO MODE: Hand control over to YouTube
    npArtWrap.classList.add('video-mode');
    vidLabel.textContent='Audio only';
    vidIconVideo.style.display='none'; vidIconAudio.style.display='';
    vidToggleBtn.classList.add('on');
    
    // Remove the invisible shield so the user can click the YouTube gear, play button, and fullscreen
    ytFrame.style.pointerEvents = 'auto'; 
    // Hide your custom play/pause bar and fullscreen button so they don't clash
    customControls.style.display = 'none'; 
    customFsBtn.style.display = 'none'; 
  } else {
    // 🎵 AUDIO MODE: Take control back to your custom UI
    npArtWrap.classList.remove('video-mode');
    vidLabel.textContent='Watch video';
    vidIconVideo.style.display=''; vidIconAudio.style.display='none';
    vidToggleBtn.classList.remove('on');
    
    // Put the invisible shield back up
    ytFrame.style.pointerEvents = 'none';
    // Bring back your custom play/pause bar and fullscreen button
    customControls.style.display = 'block'; 
    customFsBtn.style.display = 'flex'; 
  }
}

/* ── Panel open/close ── */
function openNowPlaying(){ panelOpen=true; npOverlay.classList.add('open'); }
function closeNowPlaying(){ panelOpen=false; npOverlay.classList.remove('open'); }

/* ── Controls ── */
ppBtn.addEventListener('click',e=>{ e.stopPropagation(); if(!ytPlayer) return; isPlaying?ytPlayer.pauseVideo():ytPlayer.playVideo(); });
npPpBtn.addEventListener('click',e=>{ e.stopPropagation(); if(!ytPlayer) return; isPlaying?ytPlayer.pauseVideo():ytPlayer.playVideo(); });
nextBtn.addEventListener('click',e=>{ e.stopPropagation(); playNext(); });
prevBtn.addEventListener('click',e=>{ e.stopPropagation(); playPrev(); });
npNextBtn.addEventListener('click',e=>{ e.stopPropagation(); playNext(); });
npPrevBtn.addEventListener('click',e=>{ e.stopPropagation(); playPrev(); });

progBar.addEventListener('click',e=>{
  if(!ytPlayer||!duration) return;
  const r=progBar.getBoundingClientRect();
  ytPlayer.seekTo(((e.clientX-r.left)/r.width)*duration,true);
});
npProgBar.addEventListener('click',e=>{
  if(!ytPlayer||!duration) return;
  const r=npProgBar.getBoundingClientRect();
  ytPlayer.seekTo(((e.clientX-r.left)/r.width)*duration,true);
});

volBar.addEventListener('click',e=>{
  const r=volBar.getBoundingClientRect();
  currentVolume=Math.round(Math.max(0,Math.min(1,(e.clientX-r.left)/r.width))*100);
  volFill.style.width=currentVolume+'%';
  if(ytPlayer?.setVolume) ytPlayer.setVolume(currentVolume);
});

playerBar.addEventListener('click',e=>{
  if(e.target.closest('button,.prog-bar,.vol-bar')) return;
  if(currentItem) openNowPlaying();
});

vidToggleBtn.addEventListener('click',e=>{ e.stopPropagation(); setVideoMode(!videoMode); });

/* ── Fullscreen ── */
const npFsBtn = document.getElementById('np-fs-btn');
let isFullscreen = false;

function toggleFullscreen(){
  isFullscreen = !isFullscreen;
  npOverlay.classList.toggle('fullscreen', isFullscreen);
  try{
    if(isFullscreen){
      const p = npOverlay.requestFullscreen?.() ?? npOverlay.webkitRequestFullscreen?.();
      if(p?.catch) p.catch(()=>{});
    } else {
      const p = document.fullscreenElement ? document.exitFullscreen?.() : null;
      if(p?.catch) p.catch(()=>{});
    }
  } catch(e){}
}

npFsBtn.addEventListener('click',e=>{ e.stopPropagation(); toggleFullscreen(); });
document.addEventListener('fullscreenchange',()=>{
  if(!document.fullscreenElement && isFullscreen){ isFullscreen=false; npOverlay.classList.remove('fullscreen'); }
});

/* ── Close ── */
npBackdrop.addEventListener('click', closeNowPlaying);
npCloseBtn.addEventListener('click',()=>{ if(isFullscreen) toggleFullscreen(); else closeNowPlaying(); });
document.addEventListener('keydown',e=>{
  if(e.key==='Escape'){
    if(isFullscreen){ isFullscreen=false; npOverlay.classList.remove('fullscreen'); }
    else if(panelOpen) closeNowPlaying();
  }
});

/* ── Search ── */
async function search(q, pushState=true){
  if(!q.trim()) return;
  if(pushState){
    const u=new URL(location.href);
    u.searchParams.set('q',q);
    history.pushState({q},'',u);
  }
  showSearch();
  document.getElementById('search-input').value=q;
  resultsEl.innerHTML='';
  statusEl.innerHTML='<div class="status-icon">⏳</div><div>Searching…</div>';
  statusEl.style.display='flex';
  secHeader.style.display='none';
  tracks=[]; currentIdx=-1; queueEl=resultsEl;
  try{
    const res=await fetch(`${API}/search?q=${encodeURIComponent(q)}`);
    const data=await res.json();
    statusEl.style.display='none';
    if(!data?.length){
      statusEl.innerHTML='<div class="status-icon">🎵</div><div>No results. Try something else.</div>';
      statusEl.style.display='flex'; return;
    }
    tracks=data;
    secHeader.style.display='';
    secTitle.textContent=`Results for "${q}"`;
    data.forEach((item,i)=>{
      const {title,artist}=parseTitleArtist(item.title||'');
      const row=document.createElement('div');
      row.className='trow';
      row.style.animationDelay=`${i*0.028}s`;
      row.innerHTML=`
        <div class="tnum"><span class="n">${i+1}</span><span class="pb">▶</span></div>
        <img class="tthumb" src="${item.thumbnail||''}" onerror="this.style.opacity=0" alt=""/>
        <div class="tinfo">
          <div class="ttitle">${title}</div>
          ${artist?`<div class="tartist">${artist}</div>`:''}
        </div>
        <div class="eq"><div class="eqb"></div><div class="eqb"></div><div class="eqb"></div></div>`;
      row.addEventListener('click',()=>{ tracks=data; playFromRow(item,row,i); });
      resultsEl.appendChild(row);
    });
  }catch{
    statusEl.innerHTML='<div class="status-icon">⚠️</div><div>Connection error. Please try again.</div>';
    statusEl.style.display='flex';
  }
}

document.getElementById('search-input').addEventListener('keydown',e=>{
  if(e.key==='Enter'){ const q=e.target.value.trim(); if(q) search(q); }
});

window.addEventListener('popstate',e=>{
  const q=e.state?.q||new URL(location.href).searchParams.get('q');
  if(q) search(q,false);
  else{ showHome(); history.replaceState(null,'',location.pathname); }
});

(()=>{
  const q=new URL(location.href).searchParams.get('q');
  if(q) search(q,false);
  else initHome();
})();
</script>

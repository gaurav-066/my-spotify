<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover"/>
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#000000">
<title>Raaga — Apple Music Edition</title>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg: #000000;
  --surface: #1c1c1e;
  --glass-bg: rgba(28, 28, 30, 0.65);
  --glass-border: rgba(255, 255, 255, 0.08);
  --accent: #fa243c;
  --accent-glow: rgba(250, 36, 60, 0.3);
  --text: #ffffff;
  --text-dim: #ebebf599;
  --text-muted: #ebebf54d;
  --player-h: 84px;
  --nav-w: 240px;
  --radius: 12px;
}
html,body{height:100%}
body{
  background:var(--bg); color:var(--text);
  font-family:'Plus Jakarta Sans', -apple-system, BlinkMacSystemFont, sans-serif;
  overflow:hidden; user-select:none; -webkit-tap-highlight-color:transparent;
}
.app{
  display:grid; grid-template-columns:var(--nav-w) 1fr; grid-template-rows:1fr var(--player-h);
  height:100vh; height:100dvh;
}
.sidebar{
  grid-row:1; grid-column:1; display:flex; flex-direction:column; gap:8px;
  padding:24px 16px; background:#000; border-right:1px solid var(--glass-border); z-index:5;
}
.logo{display:flex;align-items:center;gap:12px;margin-bottom:2rem;padding:0 8px;text-decoration:none}
.logo-icon{width:32px;height:32px;background:var(--accent);border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0;box-shadow:0 4px 12px var(--accent-glow)}
.logo-text{font-size:1.4rem;font-weight:800;letter-spacing:-0.03em;color:#fff;}
nav{display:flex;flex-direction:column;gap:4px}
.nav-btn{display:flex;align-items:center;gap:12px;padding:10px 12px;border-radius:8px;cursor:pointer;color:var(--text-dim);font-size:.9rem;font-weight:600;transition:all .2s;background:transparent;border:none;width:100%;text-align:left;font-family:inherit}
.nav-btn:hover{color:var(--text);background:rgba(255,255,255,0.05)}
.nav-btn.active{color:var(--accent);background:rgba(250,36,60,0.1)}
.nav-btn svg{width:20px;height:20px;fill:currentColor;flex-shrink:0}
.sidebar-lib{margin-top:2rem;padding:0 12px;flex:1;display:flex;flex-direction:column}
.lib-top{display:flex;align-items:center;gap:8px;margin-bottom:12px;color:var(--text-muted);font-size:.75rem;font-weight:700;letter-spacing:.05em;text-transform:uppercase}
.lib-hint{font-size:.8rem;color:var(--text-muted);line-height:1.6}
.main{grid-row:1;grid-column:2;background:#000;overflow-y:auto;overflow-x:hidden;scrollbar-width:none;position:relative;padding-bottom:20px; -webkit-overflow-scrolling: touch; scroll-behavior: smooth;}
.main::-webkit-scrollbar{display:none}
#view-home{animation:fadeIn .4s cubic-bezier(0.2,0.8,0.2,1)}
.home-hero{padding:3rem 2.5rem 1rem}
.home-greeting{font-size:2.2rem;font-weight:800;letter-spacing:-0.04em;line-height:1.15;margin-bottom:4px}
.home-sub{font-size:1rem;color:var(--text-dim);font-weight:500}
.home-body{padding:1rem 2.5rem 4rem}
.sec-block{margin-bottom:2.5rem}
.sec-head{display:flex;align-items:baseline;justify-content:space-between;margin-bottom:1.2rem;border-bottom:1px solid var(--glass-border);padding-bottom:8px}
.sec-title{font-size:1.2rem;font-weight:700;letter-spacing:-0.02em}
.sec-scroll{display:flex;gap:16px;overflow-x:auto;padding-bottom:10px;scrollbar-width:none;-webkit-overflow-scrolling:touch}
.mcard{flex-shrink:0;width:160px;cursor:pointer;transition:transform 0.2s ease}
.mcard:active{transform:scale(0.96)}
.mcard-art{position:relative;width:160px;height:160px;border-radius:var(--radius);overflow:hidden;background:var(--surface);margin-bottom:12px;border:1px solid var(--glass-border);box-shadow:0 8px 24px rgba(0,0,0,0.4);transition:box-shadow .3s}
.mcard:hover .mcard-art{box-shadow:0 12px 32px rgba(0,0,0,0.6)}
.mcard-img{width:100%;height:100%;object-fit:cover;display:block;transition:transform .4s}
.mcard:hover .mcard-img{transform:scale(1.04)}
.mcard-overlay{position:absolute;bottom:8px;right:8px;width:36px;height:36px;background:rgba(0,0,0,0.6);backdrop-filter:blur(10px);-webkit-backdrop-filter:blur(10px);border-radius:50%;display:flex;align-items:center;justify-content:center;opacity:0;transform:scale(0.9);transition:all .2s}
.mcard:hover .mcard-overlay,.mcard.playing .mcard-overlay{opacity:1;transform:scale(1)}
.mcard-overlay svg{fill:#fff;width:16px;height:16px;margin-left:2px}
.mcard-title{font-size:.9rem;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.mcard.playing .mcard-title{color:var(--accent)}
.mcard-artist{font-size:.8rem;color:var(--text-dim);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-top:2px}
.shimmer-art{background:var(--surface);animation:pulse 1.5s infinite alternate}
.shimmer-line{height:12px;border-radius:6px;margin-bottom:8px;background:var(--surface);animation:pulse 1.5s infinite alternate}
.shimmer-line.w80{width:80%}.shimmer-line.w55{width:55%;height:10px}
@keyframes pulse{from{opacity:0.6}to{opacity:1}}

/* --- SEARCH --- */
#view-search{animation:fadeIn .3s ease}
.search-wrap{padding:3rem 2.5rem 2rem}
.search-box{position:relative;max-width:500px;margin-bottom:2rem}
.search-box input{width:100%;background:var(--surface);border:1px solid var(--glass-border);border-radius:12px;padding:16px 20px 16px 50px;color:var(--text);font-family:'Plus Jakarta Sans',sans-serif;font-size:1rem;font-weight:500;outline:none;transition:all .2s}
.search-box input:focus{background:#252527;border-color:rgba(255,255,255,0.2);box-shadow:0 4px 20px rgba(0,0,0,0.3)}
.search-box input::placeholder{color:var(--text-muted)}
.s-icon{position:absolute;left:18px;top:50%;transform:translateY(-50%);color:var(--text-dim);pointer-events:none;width:20px;height:20px}
.r-header{font-size:1.5rem;font-weight:700;letter-spacing:-0.02em;margin-bottom:1.5rem;border-bottom:1px solid var(--glass-border);padding-bottom:10px}
#status{color:var(--text-dim);font-size:.9rem;padding:4rem 0;text-align:center;display:flex;flex-direction:column;align-items:center;gap:12px}
.status-icon{font-size:3rem;opacity:.2}
.results-list{display:flex;flex-direction:column;gap:4px}
.trow{display:grid;grid-template-columns:36px 48px 1fr auto;align-items:center;gap:14px;padding:8px 12px;border-radius:8px;cursor:pointer;transition:background .15s, transform 0.2s cubic-bezier(0.2,0,0.2,1);animation:fadeUp .3s ease both}
.trow:hover{background:var(--surface)}
.trow:active{transform:scale(0.98); background:rgba(255,255,255,0.1)}
.trow.playing{background:rgba(250,36,60,0.08)}
.tnum{text-align:right;font-size:.85rem;color:var(--text-muted);font-variant-numeric:tabular-nums;position:relative}
.tnum .n{transition:opacity .15s}
.tnum .pb{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;opacity:0;transition:opacity .15s;font-size:12px}
.trow:hover .tnum .n{opacity:0}.trow:hover .tnum .pb{opacity:1}
.trow.playing .tnum .n{opacity:0}.trow.playing .tnum .pb{opacity:1;color:var(--accent)}
.tthumb{width:48px;height:48px;border-radius:6px;object-fit:cover;background:var(--surface);display:block;border:1px solid var(--glass-border)}
.tinfo{min-width:0}
.ttitle{font-size:.95rem;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.trow.playing .ttitle{color:var(--accent)}
.tartist{font-size:.8rem;color:var(--text-dim);margin-top:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}

/* --- BOTTOM PLAYER --- */
.player{grid-row:2;grid-column:1/-1;background:var(--glass-bg);backdrop-filter:saturate(180%) blur(24px);-webkit-backdrop-filter:saturate(180%) blur(24px);border-top:1px solid var(--glass-border);display:flex;align-items:center;padding:0 24px;gap:1rem;height:var(--player-h);z-index:100;cursor:pointer}
.p-left{display:flex;align-items:center;gap:14px;width:30%;min-width:200px;flex-shrink:0}
#p-thumb{width:48px;height:48px;border-radius:6px;object-fit:cover;background:var(--surface);border:1px solid var(--glass-border);display:block;}
.p-meta{min-width:0}
#p-title{font-size:.9rem;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-bottom:2px}
#p-artist{font-size:.75rem;color:var(--text-dim);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.p-center{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:8px}
.p-ctrls{display:flex;align-items:center;gap:24px}
.cbtn{background:none;border:none;color:var(--text-dim);cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .15s;padding:4px}
.cbtn:hover{color:var(--text);transform:scale(1.05)}.cbtn svg{width:18px;height:18px;fill:currentColor}
.cbtn.pp{width:40px;height:40px;background:var(--text);border-radius:50%;color:#000;box-shadow:0 4px 12px rgba(255,255,255,0.1)}
.cbtn.pp:hover{background:#e0e0e0;transform:scale(1.04)}.cbtn.pp svg{width:20px;height:20px;fill:#000;margin-left:2px}
.prog-wrap{display:flex;align-items:center;gap:10px;width:100%;max-width:600px}
.tlabel{font-size:.65rem;color:var(--text-dim);font-variant-numeric:tabular-nums;flex-shrink:0;width:36px;font-weight:500}
.tlabel.r{text-align:right}
.prog-bar{flex:1;height:4px;background:rgba(255,255,255,.1);border-radius:2px;cursor:pointer;transition:height .15s;position:relative}
.prog-bar:hover{height:6px}
.prog-fill{height:100%;background:var(--text);border-radius:2px;width:0%;pointer-events:none;position:relative;transition: width 0.1s linear;}
.prog-bar:hover .prog-fill{background:var(--accent)}
.prog-fill::after{content:'';position:absolute;right:-6px;top:50%;transform:translateY(-50%) scale(0);width:12px;height:12px;background:#fff;border-radius:50%;transition:transform .15s;box-shadow:0 0 4px rgba(0,0,0,0.5)}
.prog-bar:hover .prog-fill::after{transform:translateY(-50%) scale(1)}
.p-right{width:30%;min-width:150px;flex-shrink:0;display:flex;align-items:center;justify-content:flex-end;gap:12px}
.vol-wrap{display:flex;align-items:center;gap:8px}
.vol-bar{width:90px;height:4px;background:rgba(255,255,255,.1);border-radius:2px;cursor:pointer;transition:height .15s}
.vol-bar:hover{height:6px}
.vol-fill{height:100%;background:var(--text-dim);border-radius:2px;width:70%}

/* --- NOW PLAYING OVERLAY --- */
.np-overlay{position:fixed;inset:0;z-index:2000;display:flex;align-items:center;justify-content:center;padding:20px;opacity:0;visibility:hidden;pointer-events:none;transition:transform 0.4s cubic-bezier(0.32,0.72,0,1) !important}
.np-overlay.open{opacity:1;visibility:visible;pointer-events:all}
.np-backdrop{position:absolute;inset:0;background:rgba(0,0,0,0.5);backdrop-filter:saturate(200%) blur(60px);-webkit-backdrop-filter:saturate(200%) blur(60px)}
.np-backdrop-img{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;opacity:0.3;filter:blur(40px);transform:scale(1.1)}
.np-panel{position:relative;width:100%;max-width:500px;background:transparent;display:flex;flex-direction:column;transform:translateY(40px) scale(0.95);transition:all .4s cubic-bezier(0.2,0.8,0.2,1);height:90vh;max-height:850px}
.np-overlay.open .np-panel{transform:translateY(0) scale(1)}
.np-close{position:absolute;top:0;left:0;width:40px;height:40px;border:none;border-radius:50%;background:rgba(255,255,255,.1);color:var(--text);cursor:pointer;z-index:10;display:flex;align-items:center;justify-content:center;transition:background .2s;backdrop-filter:blur(10px)}
.np-close:hover{background:rgba(255,255,255,.2)}.np-close svg{width:20px;height:20px;fill:currentColor}
.np-fs-btn{position:absolute;top:0;right:0;width:40px;height:40px;border:none;border-radius:50%;background:rgba(255,255,255,.1);color:var(--text);cursor:pointer;z-index:10;display:flex;align-items:center;justify-content:center;transition:background .2s;backdrop-filter:blur(10px)}
.np-fs-btn:hover{background:rgba(255,255,255,.2)}.np-fs-btn svg{width:18px;height:18px;fill:currentColor}

/* Fullscreen state */
.np-overlay.fullscreen{padding:0}
.np-overlay.fullscreen .np-panel{max-width:100%;height:100vh;max-height:100vh}
.np-overlay.fullscreen .np-art-wrap{margin-top:0;border-radius:0;height:100%;max-height:none}
.np-overlay.fullscreen .np-bottom{position:absolute;bottom:0;left:0;right:0;background:linear-gradient(to top,rgba(0,0,0,0.9) 0%,transparent 100%);padding-bottom:40px}
.np-overlay.fullscreen .np-close{top:20px;left:20px}
.np-overlay.fullscreen .np-fs-btn{top:20px;right:20px}
.fs-expand{display:flex}.fs-compress{display:none}
.np-overlay.fullscreen .fs-expand{display:none}.np-overlay.fullscreen .fs-compress{display:flex}

.np-art-wrap{position:relative;width:100%;aspect-ratio:1/1;max-height:50vh;margin-top:60px;border-radius:16px;overflow:hidden;background:#111;box-shadow:0 30px 60px rgba(0,0,0,0.6);transition:all .4s cubic-bezier(0.2,0.8,0.2,1)}
.np-art-wrap.video-mode{aspect-ratio:16/9;margin-top:auto;margin-bottom:auto}

/* YT frame — hidden by default, shown only in video mode or fallback */
#yt-player-frame{position:absolute;inset:0;width:100%;height:100%;border:none;background:#000;display:block;z-index:1;pointer-events:none;opacity:0;transition:opacity .35s ease}
.np-art-wrap.video-mode #yt-player-frame{opacity:1;pointer-events:auto}

#np-art-cover{position:absolute;inset:0;z-index:2;width:100%;height:100%;object-fit:cover;transition:opacity .35s ease;opacity:1;pointer-events:none}
.np-art-wrap.video-mode #np-art-cover{opacity:0}

/* LOADING SPINNER */
.stream-spinner{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;background:rgba(0,0,0,0.5);z-index:5;border-radius:16px;backdrop-filter: blur(10px);}
.spinner{width:36px;height:36px;border:3px solid rgba(255,255,255,0.15);border-top-color:#fff;border-radius:50%;animation:spin .7s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}

.art-pill{position:absolute;top:-40px;right:50px;z-index:10;display:inline-flex;align-items:center;gap:6px;padding:8px 16px;background:rgba(255,255,255,0.1);color:#fff;border:none;border-radius:999px;font-size:.8rem;font-weight:600;cursor:pointer;font-family:inherit;transition:all .2s;backdrop-filter:blur(10px)}
.art-pill:hover{background:rgba(255,255,255,0.2)}
.art-pill svg{width:14px;height:14px;fill:currentColor;flex-shrink:0}
.art-pill.on{background:var(--text);color:#000}

.np-bottom{display:flex;flex-direction:column;justify-content:flex-end;flex:1;padding-bottom:20px;margin-top:30px}
.np-info{display:flex;flex-direction:column;align-items:flex-start;margin-bottom:24px}
.np-song-title{font-size:1.6rem;font-weight:800;letter-spacing:-0.03em;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;width:100%}
.np-song-artist{font-size:1.1rem;color:var(--text-dim);margin-top:4px;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;width:100%}
.np-prog-wrap{display:flex;flex-direction:column;gap:8px;width:100%;margin-bottom:30px}
.np-prog-bar{width:100%;height:6px;background:rgba(255,255,255,.15);border-radius:3px;cursor:pointer;position:relative}
.np-prog-fill{height:100%;background:var(--text);border-radius:3px;width:0%;pointer-events:none; transition: width 0.1s linear;}
.np-times{display:flex;justify-content:space-between;width:100%}
.np-tlabel{font-size:.7rem;color:var(--text-dim);font-variant-numeric:tabular-nums;font-weight:600}
.np-ctrls{display:flex;align-items:center;justify-content:center;gap:40px;width:100%}
.np-cbtn{background:none;border:none;color:var(--text);cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .2s}
.np-cbtn:hover{transform:scale(1.1)}
.np-cbtn svg{width:32px;height:32px;fill:currentColor}
.np-cbtn.pp{width:72px;height:72px;background:var(--text);border-radius:50%;color:#000;box-shadow:0 10px 30px rgba(255,255,255,0.2)}
.np-cbtn.pp:hover{background:#e0e0e0;transform:scale(1.05)}.np-cbtn.pp svg{width:34px;height:34px;fill:#000;margin-left:4px}

@media(max-width:900px){
  :root{--nav-w:72px}
  .sidebar{padding:24px 8px;align-items:center}
  .logo-text,.lib-top span:not(svg),.lib-hint,.nav-btn span{display:none}
  .logo{justify-content:center;margin-bottom:2rem;padding:0}
  .nav-btn{justify-content:center;padding:12px}
  .sidebar-lib{padding:0;margin-top:2rem;align-items:center}.lib-top{justify-content:center;margin-bottom:0}
  .p-left{width:auto}.p-right{display:none}
  #p-title,#p-artist{max-width:120px}.tlabel{display:none}
  .home-hero{padding:2rem 1.5rem 1rem}.home-body{padding:1rem 1.5rem 2rem}
  .search-wrap{padding:2rem 1.5rem}
}
@media(max-width:640px){
  :root{--player-h:76px}
  .app{grid-template-columns:1fr;grid-template-rows:1fr var(--player-h) 60px}
  .sidebar{display:none}
  .main{grid-row:1;grid-column:1}
  .player{grid-row:2;grid-column:1;padding:0 16px;position:relative;overflow:hidden}
  .player::before{content:'';position:absolute;top:0;left:0;height:2px;width:var(--mob-prog,0%);background:var(--accent);pointer-events:none;transition:width .5s linear;z-index:10}
  .p-center{display:none}
  .p-left{flex:1;width:auto}
  .p-right{width:auto;display:flex;padding-right:4px}
  .p-right .vol-wrap{display:none}
  .cbtn.shuffle,.cbtn.prev,.cbtn.repeat{display:none}
  #p-thumb{width:48px;height:48px;border-radius:8px}
  #mob-pp-btn{display:flex !important}
  .mob-nav{display:flex;flex-direction:row;grid-row:3;grid-column:1;background:var(--glass-bg);backdrop-filter:saturate(180%) blur(24px);-webkit-backdrop-filter:saturate(180%) blur(24px);border-top:1px solid var(--glass-border)}
  .mnbtn{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px;background:none;border:none;color:var(--text-muted);font-family:'Plus Jakarta Sans',sans-serif;font-size:.65rem;font-weight:600;cursor:pointer;transition:color .2s;padding:6px 0}
  .mnbtn.active{color:var(--accent)}
  .mnbtn svg{width:22px;height:22px;fill:currentColor}
  .home-hero{padding:1.2rem 1rem 0.6rem}
  .home-greeting{font-size:1.7rem}
  .home-body{padding:.5rem 1rem 2rem}
  .sec-head{border-bottom:none;padding-bottom:0;margin-bottom:.6rem}
  .sec-title{font-size:1rem}
  .sec-scroll{display:flex !important;flex-wrap:nowrap !important;overflow-x:auto !important;gap:10px !important;padding-bottom:8px;-webkit-overflow-scrolling:touch;scroll-snap-type:x mandatory}
  .mcard{width:110px !important;flex-shrink:0 !important;scroll-snap-align:start}
  .mcard-art{width:110px !important;height:110px !important}
  .mcard-title{font-size:.78rem}
  .mcard-artist{font-size:.7rem}
  .mcard .mcard-overlay{opacity:1 !important;transform:scale(1) !important}
  .np-panel{height:100%;max-height:none;padding-top:20px}
  .np-art-wrap{max-height:42vh}
  .np-song-title{font-size:1.4rem}
  .trow{grid-template-columns:48px 1fr auto !important;gap:12px;padding:8px 4px}
  .tnum{display:none !important}
}
</style>
</head>
<body>
<div class="app">
  <aside class="sidebar">
    <a href="#" class="logo"><div class="logo-icon">♪</div><span class="logo-text">Raaga</span></a>
    <nav>
      <button class="nav-btn active" id="nav-home" onclick="showHome()"><svg viewBox="0 0 24 24"><path d="M12.72 2.28a1 1 0 0 0-1.44 0l-9 9a1 1 0 0 0 1.44 1.44L4 12.41V21a1 1 0 0 0 1 1h5v-6h4v6h5a1 1 0 0 0 1-1v-8.59l.28.27a1 1 0 0 0 1.44-1.44z"/></svg><span>Listen Now</span></button>
      <button class="nav-btn" id="nav-search" onclick="showSearch()"><svg viewBox="0 0 24 24"><path d="M15.5 14h-.79l-.28-.27A6.47 6.47 0 0 0 16 9.5 6.5 6.5 0 1 0 9.5 16c1.61 0 3.09-.59 4.23-1.57l.27.28v.79l5 4.99L20.49 19zm-6 0C7.01 14 5 11.99 5 9.5S7.01 5 9.5 5 14 7.01 14 9.5 11.99 14 9.5 14z"/></svg><span>Search</span></button>
    </nav>
    <div class="sidebar-lib"><div class="lib-top"><span>Library</span></div><div class="lib-hint">Search for songs to build your queue.</div></div>
  </aside>

  <main class="main" id="main">
    <div id="view-home">
      <div class="home-hero"><div class="home-greeting" id="home-greeting">Browse</div><div class="home-sub">Top playlists and trending hits</div></div>
      <div class="home-body" id="home-body"></div>
    </div>
    <div id="view-search" style="display:none">

<audio id="bg-audio" playsinline preload="none"></audio>
<script src="https://www.youtube.com/iframe_api"></script>

<script>
const API = 'https://new-youtube-o7cl.onrender.com';
const HOME_SECTIONS = [
  { id:'bollywood', title:'🎵 Bollywood Hot Hits', type:'search', value:'latest bollywood songs 2024' },
  { id:'classics', title:'📻 All Time Hindi Classics', type:'search', value:'best 90s hindi romantic songs' },
  { id:'tseries', title:'🔥 Latest from T-Series', type:'playlist', value:'UUq-Fj5jknLsUf-MWSy4_brA' },
  { id:'arijit', title:'🎤 Arijit Singh Essentials', type:'search', value:'arijit singh best songs' },
  { id:'lofi', title:'☕ Chill Lofi Beats', type:'playlist', value:'UUSJ4gkVC6NrvII8umztf0Ow' }
];

/* ── STATE ── */
let tracks = [], currentIdx = -1, isPlaying = false, progTimer = null, duration = 0, knownDuration = 0;
let ytPlayer = null, ytReady = false, activeEl = null, queueEl = null, currentItem = null, videoMode = false, panelOpen = false, currentVolume = 70;
const bgAudio = document.getElementById('bg-audio');

/* ── YOUTUBE API ── */
window.onYouTubeIframeAPIReady = () => {
  ytReady = true;
  ytPlayer = new YT.Player('yt-player-frame', {
    width:'100%', height:'100%',
    playerVars:{ autoplay:0, playsinline:1, controls:1, rel:0, modestbranding:1 },
    events:{
      onReady(e){ e.target.setVolume(currentVolume); },
      onStateChange(e){
        const S = YT.PlayerState;
        if(e.data === S.PLAYING){ 
            isPlaying = true; showPauseAll(); startLoop(); 
            if(document.getElementById('stream-spinner')) document.getElementById('stream-spinner').style.display = 'none';
        } else if(e.data === S.PAUSED){ 
            if(videoMode || bgAudio.paused) { isPlaying = false; showPlayAll(); stopLoop(); }
        }
        if(e.data === S.ENDED){ playNext(); }
      }
    }
  });
};

/* ── UI HELPERS ── */
function fmt(s){ 
    if (isNaN(s) || s === Infinity) return "0:00";
    s=Math.floor(s||0); 
    return `${Math.floor(s/60)}:${String(s%60).padStart(2,'0')}`; 
}
function showPlayAll(){ document.getElementById('play-icon').style.display=''; document.getElementById('pause-icon').style.display='none'; document.getElementById('np-play-icon').style.display=''; document.getElementById('np-pause-icon').style.display='none'; const m=document.getElementById('mob-pp-btn'); if(m) m.innerHTML='<svg viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg>'; }
function showPauseAll(){ document.getElementById('play-icon').style.display='none'; document.getElementById('pause-icon').style.display=''; document.getElementById('np-play-icon').style.display='none'; document.getElementById('np-pause-icon').style.display=''; const m=document.getElementById('mob-pp-btn'); if(m) m.innerHTML='<svg viewBox="0 0 24 24"><path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/></svg>'; }
function setNav(v){ ['home','search'].forEach(n=>{ document.getElementById('nav-'+n)?.classList.toggle('active',v===n); document.getElementById('mob-'+n)?.classList.toggle('active',v===n); }); }
function showHome(){ document.getElementById('view-home').style.display=''; document.getElementById('view-search').style.display='none'; setNav('home'); document.getElementById('main').scrollTo({top:0,behavior:'smooth'}); }
function showSearch(){ document.getElementById('view-home').style.display='none'; document.getElementById('view-search').style.display=''; setNav('search'); setTimeout(()=>document.getElementById('search-input').focus(),80); }

/* ── PROGRESS LOOP (FIXED BUG) ── */
function startLoop(){ 
  stopLoop(); 
  progTimer = setInterval(() => { 
    let curr = 0, dur = 0;
    
    if (videoMode || !bgAudio.src) {
        if (!ytPlayer?.getCurrentTime) return;
        curr = ytPlayer.getCurrentTime();
        dur = ytPlayer.getDuration();
    } else {
        curr = bgAudio.currentTime;
        // Infinity fix: Use duration passed from backend if browser fails to get it
        dur = (bgAudio.duration && bgAudio.duration !== Infinity && !isNaN(bgAudio.duration)) ? bgAudio.duration : knownDuration;
    }
    
    if (!dur || dur === Infinity) return; // Safety catch
    duration = dur; 
    
    const pct = (curr/dur)*100; 
    document.getElementById('prog-fill').style.width=pct+'%'; 
    document.getElementById('np-prog-fill').style.width=pct+'%'; 
    document.getElementById('t-cur').textContent=fmt(curr); 
    document.getElementById('np-t-cur').textContent=fmt(curr); 
    document.getElementById('t-tot').textContent=fmt(dur); 
    document.getElementById('np-t-tot').textContent=fmt(dur);
  }, 500); 
}
function stopLoop(){ if(progTimer){clearInterval(progTimer);progTimer=null;} }

bgAudio.addEventListener('play', ()=>{ if(!videoMode){isPlaying=true; showPauseAll(); startLoop();} });
bgAudio.addEventListener('pause', ()=>{ if(!videoMode){isPlaying=false; showPlayAll(); stopLoop();} });
bgAudio.addEventListener('ended', ()=>{ if(!videoMode) playNext(); });

function handleProgClick(e, bar, fill) {
  if(!duration || duration === Infinity) return;
  const r = bar.getBoundingClientRect();
  const pct = Math.max(0, Math.min(1, (e.clientX - r.left) / r.width));
  fill.style.width = (pct * 100) + '%'; 
  const seekTo = pct * duration;
  if(videoMode || !bgAudio.src){ if(ytPlayer) ytPlayer.seekTo(seekTo, true); }
  else { if(bgAudio) bgAudio.currentTime = seekTo; }
}
document.getElementById('prog-bar').addEventListener('click', e => handleProgClick(e, document.getElementById('prog-bar'), document.getElementById('prog-fill')));
document.getElementById('np-prog-bar').addEventListener('click', e => handleProgClick(e, document.getElementById('np-prog-bar'), document.getElementById('np-prog-fill')));

/* ── CORE PLAYBACK LOGIC (WITH PRECISE TIME SYNC) ── */
async function playItem(item, startAt = 0){
  currentItem = item; 
  const {title,artist} = parseTitleArtist(item.title||'');
  
  bgAudio.pause(); bgAudio.src = "";
  if(ytReady && ytPlayer) ytPlayer.pauseVideo();
  stopLoop();

  document.getElementById('p-thumb').src=item.thumbnail; 
  document.getElementById('p-title').textContent=title||item.title; 
  document.getElementById('p-artist').textContent=artist;
  document.getElementById('np-song-title').textContent=title||item.title; 
  document.getElementById('np-song-artist').textContent=artist;
  document.getElementById('np-art-cover').src=item.thumbnail; 
  document.getElementById('np-bg-img').src=item.thumbnail;
  
  openNowPlaying(); 
  showPauseAll();
  
  if (document.getElementById('stream-spinner')) document.getElementById('stream-spinner').style.display='flex';
  
  if (videoMode) {
      _loadYouTube(item.videoId, startAt);
  } else {
      try {
          const res = await fetch(`${API}/play?q=${item.videoId}`);
          const data = await res.json();
          
          if (data.url) {
              bgAudio.src = data.url;
              bgAudio.volume = currentVolume/100;
              if (data.duration) knownDuration = data.duration;
              
              bgAudio.load(); // Force browser to acknowledge the new source
              
              // Safe seeking: Wait for metadata before fast-forwarding
              if (startAt > 0) {
                  bgAudio.addEventListener('loadedmetadata', function onMeta() {
                      bgAudio.currentTime = startAt;
                      bgAudio.removeEventListener('loadedmetadata', onMeta);
                  }, { once: true });
              }
              
              bgAudio.play().catch(e => console.warn("Autoplay strict block", e));
              
              if (document.getElementById('stream-spinner')) document.getElementById('stream-spinner').style.display='none';
              startLoop();
          } else { throw new Error("No URL returned"); }
      } catch (e) {
          console.warn("Proxy fallback triggered.");
          _loadYouTube(item.videoId, startAt);
      }
  }
}

function _loadYouTube(videoId, startSeconds = 0){
  if(!ytReady || !ytPlayer){ setTimeout(()=>_loadYouTube(videoId, startSeconds), 100); return; }
  ytPlayer.loadVideoById({ videoId: videoId, startSeconds: startSeconds });
}

/* ── SYNCED MODE SWITCHING ── */
function setVideoMode(on){
  if (videoMode === on || !currentItem) return;
  
  let currentTime = videoMode ? (ytPlayer.getCurrentTime() || 0) : (bgAudio.currentTime || 0);
  
  if (videoMode) ytPlayer.pauseVideo(); 
  else { bgAudio.pause(); bgAudio.src = ""; }

  videoMode = on;
  
  const wrap = document.getElementById('np-art-wrap');
  const btn = document.getElementById('vid-toggle-btn');
  
  if (on) {
    if(wrap) wrap.classList.add('video-mode');
    if(btn) btn.classList.add('on');
    document.getElementById('vid-label').textContent = 'Switch to Audio';
    document.getElementById('vid-icon-video').style.display='none';
    document.getElementById('vid-icon-audio').style.display='block';
    
    _loadYouTube(currentItem.videoId, currentTime);
  } else {
    if(wrap) wrap.classList.remove('video-mode');
    if(btn) btn.classList.remove('on');
    document.getElementById('vid-label').textContent = 'Switch to Video';
    document.getElementById('vid-icon-video').style.display='block';
    document.getElementById('vid-icon-audio').style.display='none';
    
    playItem(currentItem, currentTime); 
  }
}

/* ── CONTROLS & NAVIGATION ── */
function togglePlayPause(){ 
  if(videoMode || !bgAudio.src){ 
      if(!ytPlayer) return; 
      ytPlayer.getPlayerState() === 1 ? ytPlayer.pauseVideo() : ytPlayer.playVideo(); 
  } else { 
      bgAudio.paused ? bgAudio.play() : bgAudio.pause(); 
  } 
}
function playNext(){ if(currentIdx>=tracks.length-1) return; currentIdx++; playItem(tracks[currentIdx]); }
function playPrev(){ if(currentIdx<=0) return; currentIdx--; playItem(tracks[currentIdx]); }

/* ── SEARCH & SECTIONS ── */
async function search(q){
  if(!q.trim()) return;
  showSearch(); 
  const resultsEl = document.getElementById('results');
  resultsEl.innerHTML=''; 
  
  try {
    const res = await fetch(`${API}/search?q=${encodeURIComponent(q)}`);
    const data = await res.json();
    if(!data?.length) return; 
    
    tracks=data; 
    document.getElementById('section-header').style.display=''; 
    document.getElementById('section-title').textContent=`Results for "${q}"`;
    
    data.forEach((item,i)=>{
      const {title,artist}=parseTitleArtist(item.title||'');
      const row=document.createElement('div'); row.className='trow'; row.style.animationDelay=`${i*0.015}s`;
      row.innerHTML=`<div class="tnum"><span class="n">${i+1}</span><span class="pb">▶</span></div><img class="tthumb" src="${item.thumbnail}"><div class="tinfo"><div class="ttitle">${title}</div><div class="tartist">${artist}</div></div>`;
      row.onclick=()=> { currentIdx=i; playItem(item); };
      resultsEl.appendChild(row);
    });
  } catch {}
}

function parseTitleArtist(raw){ const p=raw.split(' - '); return p.length>1?{artist:p[0],title:p.slice(1).join(' - ')}:{artist:'Various Artists',title:raw}; }

async function loadSection(sec,delay){ 
  await new Promise(r=>setTimeout(r,delay)); 
  try{ 
      const res=await fetch(sec.type==='playlist'?`${API}/playlist?id=${sec.value}`:`${API}/search?q=${encodeURIComponent(sec.value)}`); 
      const data=await res.json(); 
      const s=document.getElementById(`scr-${sec.id}`); s.innerHTML=''; 
      data.forEach((item,i)=>{ 
          const {title,artist}=parseTitleArtist(item.title); 
          const c=document.createElement('div'); c.className='mcard'; 
          c.innerHTML=`<div class="mcard-art"><img class="mcard-img" src="${item.thumbnail}"><div class="mcard-overlay"><svg viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg></div></div><div class="mcard-title">${title}</div><div class="mcard-artist">${artist}</div>`; 
          c.onclick=()=>{tracks=data; currentIdx=i; playItem(item);}; 
          s.appendChild(c); 
      }); 
  } catch{}
}

function initHome(){ 
  const h=new Date().getHours(), g=h<12?'Morning ☀️':h<17?'Afternoon 🌤️':'Evening 🌙'; 
  document.getElementById('home-greeting').textContent='Good '+g; 
  HOME_SECTIONS.forEach((sec,i)=>{ loadSection(sec,i*250); }); 
}

/* ── OVERLAYS & EVENTS ── */
function openNowPlaying(){ panelOpen=true; document.getElementById('np-overlay').classList.add('open'); }
function closeNowPlaying(){ panelOpen=false; document.getElementById('np-overlay').classList.remove('open'); }

document.getElementById('pp-btn').onclick=e=>{e.stopPropagation();togglePlayPause();}; 
document.getElementById('np-pp-btn').onclick=e=>{e.stopPropagation();togglePlayPause();};
document.getElementById('next-btn').onclick=e=>{e.stopPropagation();playNext();}; 
document.getElementById('np-next-btn').onclick=e=>{e.stopPropagation();playNext();};
document.getElementById('prev-btn').onclick=e=>{e.stopPropagation();playPrev();}; 
document.getElementById('np-prev-btn').onclick=e=>{e.stopPropagation();playPrev();};
if(document.getElementById('vid-toggle-btn')) document.getElementById('vid-toggle-btn').onclick=e=>{e.stopPropagation();setVideoMode(!videoMode);};

document.getElementById('player-bar').onclick=e=>{if(!e.target.closest('button, .prog-bar, .vol-bar')) openNowPlaying();};
document.getElementById('np-close-btn').onclick=closeNowPlaying; 
document.getElementById('np-backdrop').onclick=closeNowPlaying;
document.getElementById('search-input').onkeydown=e=>{if(e.key==='Enter')search(e.target.value);};

/* ── Fullscreen ── */
let isFullscreen = false;
document.getElementById('np-fs-btn').onclick = e => {
  e.stopPropagation(); isFullscreen = !isFullscreen;
  document.getElementById('np-overlay').classList.toggle('fullscreen', isFullscreen);
  try {
      if(isFullscreen) { const p = document.getElementById('np-overlay').requestFullscreen?.() ?? document.getElementById('np-overlay').webkitRequestFullscreen?.(); if(p?.catch) p.catch(()=>{}); }
      else { const p = document.fullscreenElement ? document.exitFullscreen?.() : null; if(p?.catch) p.catch(()=>{}); }
  } catch(e){}
};

initHome();
</script>

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover"/>
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#000000">
<link rel="manifest" href="/manifest.json">
<title>Raaga — Apple Music Edition</title>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet"/>
<link rel="stylesheet" href="style.css">
</head>
<body>
<div class="app">

  <aside class="sidebar">
    <a href="#" class="logo">
      <div class="logo-icon">♪</div>
      <span class="logo-text">Raaga</span>
    </a>
    <nav>
      <button class="nav-btn active" id="nav-home">
        <svg viewBox="0 0 24 24"><path d="M12.72 2.28a1 1 0 0 0-1.44 0l-9 9a1 1 0 0 0 1.44 1.44L4 12.41V21a1 1 0 0 0 1 1h5v-6h4v6h5a1 1 0 0 0 1-1v-8.59l.28.27a1 1 0 0 0 1.44-1.44z"/></svg>
        <span>Listen Now</span>
      </button>
      <button class="nav-btn" id="nav-search">
        <svg viewBox="0 0 24 24"><path d="M15.5 14h-.79l-.28-.27A6.47 6.47 0 0 0 16 9.5 6.5 6.5 0 1 0 9.5 16c1.61 0 3.09-.59 4.23-1.57l.27.28v.79l5 4.99L20.49 19zm-6 0C7.01 14 5 11.99 5 9.5S7.01 5 9.5 5 14 7.01 14 9.5 11.99 14 9.5 14z"/></svg>
        <span>Search</span>
      </button>
    </nav>
    <div class="sidebar-lib">
      <div class="lib-top">
        <span>Library</span>
      </div>
      <div class="lib-hint">Search for songs to build your queue.</div>
    </div>
  </aside>

  <main class="main" id="main">
    <div id="view-home">
      <div class="home-hero">
        <div class="home-greeting" id="home-greeting">Browse</div>
        <div class="home-sub">Top playlists and trending hits</div>
      </div>
      <div class="home-body" id="home-body"></div>
    </div>

    <div id="view-search" style="display:none">
      <div class="search-wrap">
        <div class="search-box">
          <svg class="s-icon" viewBox="0 0 24 24"><path fill="currentColor" d="M15.5 14h-.79l-.28-.27A6.47 6.47 0 0 0 16 9.5 6.5 6.5 0 1 0 9.5 16c1.61 0 3.09-.59 4.23-1.57l.27.28v.79l5 4.99L20.49 19zm-6 0C7.01 14 5 11.99 5 9.5S7.01 5 9.5 5 14 7.01 14 9.5 11.99 14 9.5 14z"/></svg>
          <input id="search-input" type="text" placeholder="Artists, Songs, or Playlist Links…" autocomplete="off"/>
        </div>
        <div id="section-header" style="display:none">
          <div class="r-header" id="section-title">Results</div>
        </div>
        <div id="status">
          <div class="status-icon">♪</div>
          <div>Search for a track or paste a YouTube Playlist URL</div>
        </div>
        <div class="results-list" id="results"></div>
      </div>
    </div>
  </main>

  <nav class="mob-nav">
    <button class="mnbtn active" id="mob-home">
      <svg viewBox="0 0 24 24"><path d="M12.72 2.28a1 1 0 0 0-1.44 0l-9 9a1 1 0 0 0 1.44 1.44L4 12.41V21a1 1 0 0 0 1 1h5v-6h4v6h5a1 1 0 0 0 1-1v-8.59l.28.27a1 1 0 0 0 1.44-1.44z"/></svg>
      Listen Now
    </button>
    <button class="mnbtn" id="mob-search">
      <svg viewBox="0 0 24 24"><path d="M15.5 14h-.79l-.28-.27A6.47 6.47 0 0 0 16 9.5 6.5 6.5 0 1 0 9.5 16c1.61 0 3.09-.59 4.23-1.57l.27.28v.79l5 4.99L20.49 19zm-6 0C7.01 14 5 11.99 5 9.5S7.01 5 9.5 5 14 7.01 14 9.5 11.99 14 9.5 14z"/></svg>
      Search
    </button>
  </nav>

  <div class="player" id="player-bar">
    <div class="p-left">
      <img id="p-thumb" src="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 1 1'%3E%3C/svg%3E" alt=""/>
      <div class="p-meta">
        <div id="p-title">Not Playing</div>
        <div id="p-artist">Select a track</div>
      </div>
    </div>
    <div class="p-center">
      <div class="p-ctrls">
        <button class="cbtn shuffle"><svg viewBox="0 0 24 24"><path d="M17 17h-2l-4-4 4-4h2v2.17l3.54-3.54-1.42-1.42L18 7.83V5h-3l-5 5-5-5H2v2h2.17L.71 10.46l1.42 1.42L5.83 9h-.66l5 5-5 5H2v2h3l5-5 5 5h3v-2.17l1.41 1.42 1.42-1.42L18 16.17V17z"/></svg></button>
        <button class="cbtn prev" id="prev-btn"><svg viewBox="0 0 24 24"><path d="M6 6h2v12H6zm3.5 6 8.5 6V6z"/></svg></button>
        <button class="cbtn pp" id="pp-btn">
          <svg id="play-icon" viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg>
          <svg id="pause-icon" viewBox="0 0 24 24" style="display:none"><path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/></svg>
        </button>
        <button class="cbtn next-btn" id="next-btn"><svg viewBox="0 0 24 24"><path d="M6 18l8.5-6L6 6v12zM16 6v12h2V6h-2z"/></svg></button>
        <button class="cbtn repeat"><svg viewBox="0 0 24 24"><path d="M7 7h10v3l4-4-4-4v3H5v6h2V7zm10 10H7v-3l-4 4 4 4v-3h12v-6h-2v4z"/></svg></button>
      </div>
      <div class="prog-wrap">
        <span class="tlabel" id="t-cur">0:00</span>
        <div class="prog-bar" id="prog-bar"><div class="prog-fill" id="prog-fill"></div></div>
        <span class="tlabel r" id="t-tot">0:00</span>
      </div>
    </div>
    <div class="p-right">
      <button class="cbtn pp" id="mob-pp-btn" style="display:none">
        <svg viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg>
      </button>
      <div class="vol-wrap">
        <button class="cbtn"><svg viewBox="0 0 24 24"><path d="M3 9v6h4l5 5V4L7 9H3zm13.5 3c0-1.77-1.02-3.29-2.5-4.03v8.05c1.48-.73 2.5-2.25 2.5-4.02z"/></svg></button>
        <div class="vol-bar" id="vol-bar"><div class="vol-fill" id="vol-fill"></div></div>
      </div>
    </div>
  </div>

</div>

<div class="np-overlay" id="np-overlay">
  <img id="np-bg-img" class="np-backdrop-img" src=""/>
  <div class="np-backdrop" id="np-backdrop"></div>
  
  <div class="np-panel">
    <button class="np-close" id="np-close-btn">
      <svg viewBox="0 0 24 24"><path d="M18.3 5.71 12 12l6.3 6.29-1.41 1.42L10.59 13.4 4.3 19.71 2.89 18.3 9.18 12 2.89 5.71 4.3 4.29l6.29 6.3 6.3-6.3z"/></svg>
    </button>
    <button class="np-fs-btn" id="np-fs-btn" title="Fullscreen">
      <svg class="fs-expand" viewBox="0 0 24 24"><path d="M7 14H5v5h5v-2H7v-3zm-2-4h2V7h3V5H5v5zm12 7h-3v2h5v-5h-2v3zM14 5v2h3v3h2V5h-5z"/></svg>
      <svg class="fs-compress" viewBox="0 0 24 24" style="display:none"><path d="M5 16h3v3h2v-5H5v2zm3-8H5v2h5V5H8v3zm6 11h2v-3h3v-2h-5v5zm2-11V5h-2v5h5V8h-3z"/></svg>
    </button>

    <div class="np-art-wrap" id="np-art-wrap">
      <div id="yt-player-frame"></div>
      <img id="np-art-cover" src="" alt=""/>
    </div>

    <div style="position:relative; width:100%; height:0; z-index: 10;">
      <button class="art-pill" id="vid-toggle-btn">
        <svg id="vid-icon-video" viewBox="0 0 24 24"><path d="M17 10.5V7c0-.55-.45-1-1-1H4c-.55 0-1 .45-1 1v10c0 .55.45 1 1 1h12c.55 0 1-.45 1-1v-3.5l4 4v-11l-4 4z"/></svg>
        <svg id="vid-icon-audio" viewBox="0 0 24 24" style="display:none"><path d="M12 3v10.55c-.59-.34-1.27-.55-2-.55-2.21 0-4 1.79-4 4s1.79 4 4 4 4-1.79 4-4V7h4V3h-6z"/></svg>
        <span id="vid-label">Switch to Video</span>
      </button>
    </div>

    <div class="np-bottom">
      <div class="np-info">
        <div class="np-song-title" id="np-song-title">—</div>
        <div class="np-song-artist" id="np-song-artist"></div>
      </div>
      
      <div class="np-prog-wrap">
        <div class="np-prog-bar" id="np-prog-bar"><div class="np-prog-fill" id="np-prog-fill"></div></div>
        <div class="np-times">
          <span class="np-tlabel" id="np-t-cur">0:00</span>
          <span class="np-tlabel r" id="np-t-tot">0:00</span>
        </div>
      </div>

      <div class="np-ctrls">
        <button class="np-cbtn" id="np-prev-btn"><svg viewBox="0 0 24 24"><path d="M6 6h2v12H6zm3.5 6 8.5 6V6z"/></svg></button>
        <button class="np-cbtn pp" id="np-pp-btn">
          <svg id="np-play-icon" viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg>
          <svg id="np-pause-icon" viewBox="0 0 24 24" style="display:none"><path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/></svg>
        </button>
        <button class="np-cbtn" id="np-next-btn"><svg viewBox="0 0 24 24"><path d="M6 18l8.5-6L6 6v12zM16 6v12h2V6h-2z"/></svg></button>
      </div>
    </div>
  </div>
</div>

<script src="https://www.youtube.com/iframe_api"></script>
<script src="script.js"></script>
</body>
</html>
